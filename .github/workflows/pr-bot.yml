name: PR bot queue

# Runs the non-GPU PR gate chain all day and keeps dashboard/data.json aligned
# with the current queue. It checks out protected main code only; it never runs
# code from a contributor PR.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pr-bot-queue
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sweep open PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run --extra test python -m eval.pr_bot \
            --repo "${{ github.repository }}" \
            --write \
            --dashboard-data dashboard/data.json

      - name: Commit dashboard queue if changed
        run: |
          if git diff --quiet -- dashboard/data.json; then
            echo "No dashboard queue changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json
          git commit -m "dashboard: update PR GPU queue"
          git push
