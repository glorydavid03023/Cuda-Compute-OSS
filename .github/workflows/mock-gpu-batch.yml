name: Mock GPU batch evaluation

# Manual dry run for the full Phase 3 path without renting an RTX 5090. It
# consumes the real PR queue but writes mock RTX 5090 result JSON.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of queued PRs to mock-evaluate; 0 means all"
        required: true
        default: "1"
      write_results:
        description: "Apply labels/comments and commit ledger/dashboard data"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      close_rejected:
        description: "Close PRs that receive eval:REJECT"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: mock-gpu-batch-evaluation
  cancel-in-progress: false

jobs:
  mock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Produce mock result artifacts
        env:
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          uv run --extra test python -m eval.gpu_batch \
            --repo "${{ github.repository }}" \
            --queue dashboard/data.json \
            --limit "$LIMIT" \
            --run \
            --mock

      - name: Process mock results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WRITE_RESULTS: ${{ github.event.inputs.write_results }}
          CLOSE_REJECTED: ${{ github.event.inputs.close_rejected }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          results=(gpu-results/*.json)
          if [ ${#results[@]} -eq 0 ]; then
            echo "No mock result files to process."
            exit 0
          fi
          args=()
          if [ "$WRITE_RESULTS" = "true" ]; then
            args+=(--write)
          fi
          if [ "$CLOSE_REJECTED" = "true" ]; then
            args+=(--close-rejected)
          fi
          uv run --extra test python -m eval.result_bot "${results[@]}" \
            --repo "${{ github.repository }}" \
            "${args[@]}"

      - name: Commit mock ledger and dashboard result data if requested
        if: github.event.inputs.write_results == 'true'
        run: |
          if git diff --quiet -- eval/ledger.jsonl dashboard/results.json; then
            echo "No result data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eval/ledger.jsonl dashboard/results.json
          git commit -m "dashboard: update mock eval results"
          git push

      - name: Upload mock results
        uses: actions/upload-artifact@v4
        with:
          name: mock-gpu-results
          path: gpu-results/*.json
          if-no-files-found: warn
