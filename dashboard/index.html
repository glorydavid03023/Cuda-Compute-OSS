<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CCO PR Queue</title>
  <style>
    :root {
      --bg: #f5f2eb;
      --ink: #17211d;
      --muted: #66736e;
      --line: #c9d3c8;
      --panel: #fffdf7;
      --accent: #006b75;
      --queued: #256b3f;
      --warn: #a05b00;
      --blocked: #9e1b1b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(135deg, rgba(0, 107, 117, 0.11), transparent 34rem),
        radial-gradient(circle at right top, rgba(255, 255, 255, 0.82), transparent 22rem),
        var(--bg);
      color: var(--ink);
      font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", "Liberation Mono", monospace;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.1rem, 5vw, 4.7rem);
      font-weight: 700;
      letter-spacing: 0;
      line-height: 0.92;
    }

    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      text-align: right;
      line-height: 1.55;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 20px 0;
    }

    .metric {
      border: 1px solid var(--line);
      background: rgba(255, 253, 247, 0.68);
      padding: 14px;
      min-height: 84px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 1.8rem;
      line-height: 1;
    }

    section {
      margin-top: 26px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 0.92rem;
    }

    th {
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      background: rgba(201, 211, 200, 0.28);
    }

    tr:last-child td { border-bottom: 0; }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .state {
      display: inline-block;
      padding: 3px 7px;
      border: 1px solid var(--line);
      background: #fff;
      white-space: nowrap;
    }

    .eval_pending,
    .already_evaluated { color: var(--queued); }
    .needs_scorecard,
    .copycat_warn { color: var(--warn); }
    .copycat_block,
    .close_blocked { color: var(--blocked); }

    .empty {
      border: 1px dashed var(--line);
      background: rgba(255, 253, 247, 0.55);
      padding: 22px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      header, .metrics {
        grid-template-columns: 1fr;
      }
      .meta {
        text-align: left;
      }
      main {
        width: min(100vw - 20px, 1180px);
        padding-top: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>CCO PR Queue</h1>
      <div class="meta">
        <div id="updated">Loading dashboard/data.json</div>
        <div id="policy"></div>
      </div>
    </header>

    <div class="metrics" aria-live="polite">
      <div class="metric"><span>Queued for GPU</span><strong id="queued-count">0</strong></div>
      <div class="metric"><span>Open PRs</span><strong id="open-count">0</strong></div>
      <div class="metric"><span>Mode</span><strong id="mode">-</strong></div>
    </div>

    <section>
      <h2>Sequential GPU Batch</h2>
      <div id="queue"></div>
    </section>

    <section>
      <h2>All Open PR States</h2>
      <div id="open-prs"></div>
    </section>
  </main>

  <script>
    const cell = (value) => String(value ?? "");
    const link = (item) => item.url
      ? `<a href="${item.url}">#${item.pr}</a>`
      : `#${item.pr}`;

    function renderTable(items, columns, emptyText) {
      if (!items.length) return `<div class="empty">${emptyText}</div>`;
      const head = columns.map(([label]) => `<th>${label}</th>`).join("");
      const rows = items.map((item) => {
        const cols = columns.map(([, render]) => `<td>${render(item)}</td>`).join("");
        return `<tr>${cols}</tr>`;
      }).join("");
      return `<div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function state(value) {
      return `<span class="state ${cell(value)}">${cell(value)}</span>`;
    }

    fetch("data.json", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then((data) => {
        const queue = data.queue || [];
        const open = data.open_prs || [];
        const policy = data.gpu_policy || {};

        document.getElementById("queued-count").textContent = queue.length;
        document.getElementById("open-count").textContent = open.length;
        document.getElementById("mode").textContent = policy.mode || "-";
        document.getElementById("updated").textContent = data.updated
          ? `Updated ${data.updated}`
          : "Waiting for first bot sweep";
        document.getElementById("policy").textContent = policy.cadence || "";

        document.getElementById("queue").innerHTML = renderTable(queue, [
          ["Pos", (item) => cell(item.position)],
          ["PR", link],
          ["Title", (item) => cell(item.title)],
          ["Author", (item) => cell(item.author)],
          ["State", (item) => state(item.state)],
          ["Head", (item) => cell(item.head_sha).slice(0, 12)],
        ], "No PRs are ready for the next GPU batch.");

        document.getElementById("open-prs").innerHTML = renderTable(open, [
          ["PR", link],
          ["Title", (item) => cell(item.title)],
          ["Author", (item) => cell(item.author)],
          ["State", (item) => state(item.state)],
          ["Detail", (item) => cell(item.detail)],
        ], "No open PRs.");
      })
      .catch((error) => {
        document.getElementById("queue").innerHTML =
          `<div class="empty">Could not load dashboard/data.json: ${error.message}</div>`;
      });
  </script>
</body>
</html>
